resources:
  pipelines:
    finpay_etl_pipeline:
      name: ${bundle.target}_finpay_etl_pipeline
      catalog: ${var.catalog}
      schema: ${var.schema}

      serverless: true
      development: ${var.pipeline_development}
      continuous: false
      channel: CURRENT
      photon: true

      libraries:
        - file:
            path: ../src/utils.py
        - file:
            path: ../src/bronze.py
        - file:
            path: ../src/silver.py
        - file:
            path: ../src/gold.py

      configuration:
        spark.databricks.delta.schema.autoMerge.enabled: "true"
        finpay.catalog: "${var.catalog}"
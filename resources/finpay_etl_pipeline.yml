resources:
  pipelines:
    finpay_etl_pipeline:
      name: ${bundle.target}_finpay_etl_pipeline
      catalog: ${var.catalog}
      schema: ${var.schema}

      serverless: true
      development: ${var.pipeline_development}
      continuous: false
      channel: CURRENT
      photon: true

      event_log:
        catalog: ${var.catalog}
        schema: observability
        name: finpay_etl_pipeline_event_log

      libraries:
        - file:
            path: ../src/utils.py
        - file:
            path: ../src/bronze.py
        - file:
            path: ../src/silver.py
        - file:
            path: ../src/gold.py

      configuration:
        spark.databricks.delta.schema.autoMerge.enabled: "true"
        finpay.catalog: "${var.catalog}"
        finpay.schema: "${var.schema}"
        finpay.observability_schema: "observability"